<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe | Mesrop Arcade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">Mesrop Arcade</a>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <div class="container">
      <h1 style="color:#a07eff;text-align:center;">Tic-Tac-Toe</h1>
      <div class="tic-container">
        <div class="tic-grid" id="tic-grid">
          <!-- cells will be generated by JS -->
        </div>
        <div id="status"></div>
        <button id="restart" class="button" style="margin-top:20px;display:none;">Play Again</button>
      </div>
    </div>
  </main>
  <footer>
    &copy; <span id="year"></span> Mesrop Arcade. All rights reserved.
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script src="js/tictactoe.js"></script>
</body>
</html>
